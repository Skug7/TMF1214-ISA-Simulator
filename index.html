<!DOCTYPE html>
<html lang="en">
<head>
    <title>Web-ISA Simulator Starter</title>
    <style>
        body { font-family: monospace; background: #1e1e1e; color: #00ff00; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .box { border: 1px solid #00ff00; padding: 10px; }
        textarea { width: 100%; height: 100px; background: #000; color: #fff; }
        button { background: #00ff00; color: #000; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>8-Bit Web CPU Simulator</h1>
    <div class="grid">
        <div class="box">
            <h3>Assembly Code</h3>
            <textarea id="code">LOAD R1 10
LOAD R2 20
ADD R3 R1 R2</textarea>
            <br><br>
            <button onclick="runProgram()">Execute Program</button>
        </div>
        <div class="box">
            <h3>CPU State</h3>
            <div id="registers">Registers: [0, 0, 0, 0]</div>
            <div id="pc">PC: 0</div>
            <hr>
            <h3>Output Console</h3>
            <div id="console"></div>
        </div>
    </div>
    <script src="simulator.js"></script>
</body>
</html>
